name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, pdo_sqlite, sqlite3, zip, fileinfo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare application environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*$/m', 'APP_KEY=', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/^DB_CONNECTION=.*$/m', 'DB_CONNECTION=sqlite', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/^# DB_DATABASE=.*$/m', 'DB_DATABASE=${GITHUB_WORKSPACE}/database/database.sqlite', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/^SESSION_DRIVER=.*$/m', 'SESSION_DRIVER=file', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/^CACHE_STORE=.*$/m', 'CACHE_STORE=file', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/^QUEUE_CONNECTION=.*$/m', 'QUEUE_CONNECTION=sync', file_get_contents('.env')));"
          php artisan key:generate

      - name: Run database migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: file
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force

      - name: Run test suite
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
          SESSION_DRIVER: file
          CACHE_STORE: file
          QUEUE_CONNECTION: sync
        run: php artisan test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: false
          tags: ${{ github.repository }}:ci

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/asentinel:latest
