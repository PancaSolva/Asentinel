name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: "8.5"
  DB_CONNECTION: sqlite
  DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
  SESSION_DRIVER: file
  CACHE_STORE: file
  QUEUE_CONNECTION: sync

jobs:
  test:
    name: Laravel Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_sqlite, sqlite3, zip, fileinfo
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Prepare SQLite environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run application tests
        run: php artisan test

  docker-compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare Docker environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env

      - name: Pull service images
        run: docker compose pull

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for application container health
        run: |
          for i in {1..20}; do
            status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}unknown{{end}}' $(docker compose ps -q app) 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 3
          done
          docker compose ps
          docker compose logs --no-color app || true
          exit 1

      - name: Wait for health endpoint
        run: |
          for i in {1..20}; do
            status="$(curl -s -o /tmp/health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 3
          done
          cat /tmp/health.json || true
          echo "Docker Compose service status:"
          docker compose ps
          echo "Docker Compose logs:"
          docker compose logs --no-color || true
          exit 1

      - name: Collect Docker Compose logs
        if: failure()
        run: docker compose logs --no-color > /tmp/docker-compose.log

      - name: Upload Docker Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: |
            /tmp/health.json
            /tmp/docker-compose.log
          if-no-files-found: ignore

      - name: Shutdown Docker Compose stack
        if: always()
        run: docker compose down --remove-orphans
