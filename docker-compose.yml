services:
  app:
    image: php:8.5-fpm-alpine
    container_name: asentinel-app
    working_dir: /var/www
    environment:
      # Minimal Laravel runtime defaults for Docker development.
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: asentinel
      DB_USERNAME: asentinel
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - .:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    command: ["php-fpm"]
    healthcheck:
      # Keep the baseline health check independent from full app bootstrap.
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - asentinel

  nginx:
    image: nginx:stable-alpine
    container_name: asentinel-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - asentinel

  mysql:
    image: mysql:8.4
    container_name: asentinel-mysql
    environment:
      # Minimal database credentials for local container orchestration.
      MYSQL_DATABASE: asentinel
      MYSQL_USER: asentinel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33060:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - asentinel

  webhook:
    build: ./webhook
    container_name: asentinel-webhook
    ports:
      - "9000:9000"
    env_file:
      - ./webhook/.env
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - asentinel

networks:
  asentinel:
    driver: bridge

volumes:
  mysql_data:
    driver: local
