services:
  app:
    image: lidiman/asentinel-app:latest
    env_file: .env
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://nginx
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-3}
      HEALTH_SERVICE_NAME: asentinel-app
      HEALTH_EXTERNAL_API_ENABLED: ${HEALTH_EXTERNAL_API_ENABLED:-false}
      HEALTH_EXTERNAL_API_URL: ${HEALTH_EXTERNAL_API_URL:-}
      HEALTH_EXTERNAL_API_TIMEOUT: ${HEALTH_EXTERNAL_API_TIMEOUT:-2}
      HEALTH_EXTERNAL_API_CONNECT_TIMEOUT: ${HEALTH_EXTERNAL_API_CONNECT_TIMEOUT:-1}
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - .:/var/www
    healthcheck:
      test: ["CMD", "php", "artisan", "health:check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - asentinel
  nginx:
    image: lidiman/asentinel-nginx:latest
    env_file: .env
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - asentinel
networks:
  asentinel:
    driver: bridge
