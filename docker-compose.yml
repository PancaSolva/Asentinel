services:
  db:
    image: mysql:8.4
    command: ["--default-authentication-plugin=caching_sha2_password", "--mysqlx=0", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-asentinel}
      MYSQL_USER: ${DB_USERNAME:-asentinel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --connect-timeout=3 --silent"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - asentinel
  app:
    image: lidiman/asentinel-app:latest
    env_file: .env
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://nginx
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-asentinel}
      DB_USERNAME: ${DB_USERNAME:-asentinel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-3}
      HEALTH_SERVICE_NAME: asentinel-app
      HEALTH_EXTERNAL_API_ENABLED: ${HEALTH_EXTERNAL_API_ENABLED:-false}
      HEALTH_EXTERNAL_API_URL: ${HEALTH_EXTERNAL_API_URL:-}
      HEALTH_EXTERNAL_API_TIMEOUT: ${HEALTH_EXTERNAL_API_TIMEOUT:-2}
      HEALTH_EXTERNAL_API_CONNECT_TIMEOUT: ${HEALTH_EXTERNAL_API_CONNECT_TIMEOUT:-1}
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "health:check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - asentinel
  nginx:
    image: lidiman/asentinel-nginx:latest
    env_file: .env
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - asentinel
volumes:
  mysql_data:
networks:
  asentinel:
    driver: bridge
